name = "vcard-qr-generator-api"
main = "workers/router.js"
compatibility_date = "2024-06-20"

routes = [
  { pattern = "api.vcardqrcodegenerator.com/*", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "www.vcardqrcodegenerator.com/", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/payment/verify", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "www.vcardqrcodegenerator.com/payment/verify", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/payment/create-checkout", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "www.vcardqrcodegenerator.com/payment/create-checkout", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/ads.txt", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/v1/*", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/api", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/api/*", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/mcp*", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/openapi.json", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/api/openapi.json", zone_name = "vcardqrcodegenerator.com" },
  { pattern = "vcardqrcodegenerator.com/.well-known/*", zone_name = "vcardqrcodegenerator.com" }
]

# [[d1_databases]]
# binding = "DB"
# database_name = "vcard_qr_generator"
# database_id = "<YOUR_D1_DATABASE_ID>"

[vars]
DODO_LICENSE_PRODUCT_ID = "pdt_ROmfPNXoSRQ16tKgZWURT"
# Optional per-page overrides. If unset, both static logo pages use DODO_LICENSE_PRODUCT_ID.
# DODO_LOGO_VCARD_PRODUCT_ID = "pdt_..."
# DODO_LOGO_GENERIC_PRODUCT_ID = "pdt_..."

# Secrets (set via `wrangler secret put ...`):
# - DODO_WEBHOOK_SECRET
# - DODO_API_KEY
# - JWT_PRIVATE_KEY
