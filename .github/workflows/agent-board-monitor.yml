name: Agent Board Monitor

on:
  workflow_dispatch: # Monitor paused (cron removed)

permissions:
  contents: read

jobs:
  google-ads-pilot-forecast:
    runs-on: ubuntu-latest
    env:
      GOOGLE_ADS_DEVELOPER_TOKEN: ${{ secrets.GOOGLE_ADS_DEVELOPER_TOKEN }}
      GOOGLE_ADS_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_CUSTOMER_ID }}
      GOOGLE_ADS_LOGIN_CUSTOMER_ID: ${{ secrets.GOOGLE_ADS_LOGIN_CUSTOMER_ID }}
      GOOGLE_ADS_CLIENT_ID: ${{ secrets.GOOGLE_ADS_CLIENT_ID }}
      GOOGLE_ADS_CLIENT_SECRET: ${{ secrets.GOOGLE_ADS_CLIENT_SECRET }}
      GOOGLE_ADS_REFRESH_TOKEN: ${{ secrets.GOOGLE_ADS_REFRESH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Google Ads client
        run: python -m pip install "google-ads==30.1.0"
      - name: Generate read-only 10-day forecast
        run: python scripts/google_ads_pilot_forecast.py
      - name: Upload forecast artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: google-ads-pilot-forecast
          path: .private/google-ads/pilot-forecast.json
          if-no-files-found: warn
