<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thanks - Unlocking Pro...</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://www.vcardqrcodegenerator.com/success.html" />
  <script src="/consent.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E90B41BNEH"></script>
  <script>
    gtag('js', new Date());
    gtag('config', 'G-E90B41BNEH');
  </script>
  <script src="/analytics.js"></script>
  <style>
    body {font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif; margin:0; padding:3rem; color:#111;}
    .card {max-width:560px; margin:0 auto; border:1px solid #e5e7eb; border-radius:12px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.06)}
    h1 {font-size:1.5rem; margin:0 0 .5rem}
    p {margin:.25rem 0}
    .muted {color:#6b7280; font-size:.95rem}
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment complete</h1>
    <p>We're unlocking Pro features for this browser.</p>
    <p class="muted">You'll be redirected in a moment...</p>
  </div>

  <script>
    (async function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var transactionId = params.get('payment_id') || params.get('transaction_id') || params.get('session_id') || params.get('token');
        var planId = params.get('plan_id') || 'logo_vcard_one_time';
        var planName = planId === 'logo_generic_one_time' ? 'Generic Logo QR Code' : 'Logo vCard QR Code';
        var payment = null;
        if (params.get('payment_id')) {
          var response = await fetch('https://www.vcardqrcodegenerator.com/payment/verify', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ payment_id: params.get('payment_id'), plan_id: planId })
          });
          var json = await response.json();
          if (json.success) payment = json;
        } else if (transactionId) {
          payment = {
            payment_id: transactionId,
            value: 4.99,
            currency: 'USD',
            plan_id: planId,
            plan_name: planName,
            status: 'succeeded'
          };
        }

        if (payment && window.VcardAnalytics) {
          var value = typeof payment.value === 'number' ? payment.value : 4.99;
          var currency = payment.currency || 'USD';
          planId = payment.plan_id || planId;
          planName = payment.plan_name || planName;
          localStorage.setItem('pro_verified_unlock', JSON.stringify({
            payment_id: payment.payment_id || transactionId,
            plan_id: planId,
            value: value,
            currency: currency,
            status: payment.status || 'succeeded',
            expires_at: Date.now() + 24 * 60 * 60 * 1000
          }));
          var purchaseTracked = window.VcardAnalytics.trackPurchase({
            transaction_id: payment.payment_id || transactionId,
            value: value,
            currency: currency,
            plan_id: planId,
            plan_name: planName,
            payment_provider: 'dodo',
            payment_status: payment.status || 'succeeded',
            source_page: window.location.pathname,
            items: [{
              item_id: planId,
              item_name: planName,
              item_category: 'vcard_qr',
              price: value,
              quantity: 1
            }]
          });
          if (purchaseTracked !== false) {
            window.VcardAnalytics.trackEvent('pro_payment_success', {
              transaction_id: payment.payment_id || transactionId,
              value: value,
              currency: currency,
              plan_id: planId,
              plan_name: planName,
              payment_provider: 'dodo',
              payment_status: payment.status || 'succeeded',
              source_page: window.location.pathname
            });
          }
        }
      } catch (e) {}

      setTimeout(function () {
        window.location.replace('/logo-qr-code.html');
      }, 800);
    })();
  </script>
</body>
</html>
