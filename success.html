<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Thanks - Unlocking Pro...</title>
  <meta name="robots" content="noindex" />
  <link rel="canonical" href="https://www.vcardqrcodegenerator.com/success.html" />
  <script src="/consent.js"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E90B41BNEH"></script>
  <script>
    gtag('js', new Date());
    gtag('config', 'G-E90B41BNEH');
  </script>
  <script src="/analytics.js"></script>
  <style>
    body {font-family: system-ui, -apple-system, Segoe UI, Roboto, Inter, Arial, sans-serif; margin:0; padding:3rem; color:#111;}
    .card {max-width:560px; margin:0 auto; border:1px solid #e5e7eb; border-radius:12px; padding:24px; box-shadow:0 10px 30px rgba(0,0,0,.06)}
    h1 {font-size:1.5rem; margin:0 0 .5rem}
    p {margin:.25rem 0}
    .muted {color:#6b7280; font-size:.95rem}
  </style>
</head>
<body>
  <div class="card">
    <h1>Payment complete</h1>
    <p id="status-message">We're unlocking Pro features for this browser.</p>
    <p id="status-detail" class="muted">You'll be redirected in a moment...</p>
    <p id="support-action" class="muted" style="display:none;">If you already paid, do not pay again. Email <a href="mailto:support@vcardqrcodegenerator.com?subject=Logo%20QR%20payment%20unlock%20help">support@vcardqrcodegenerator.com</a> with your Dodo receipt or payment ID.</p>
  </div>

  <script>
    (async function () {
      var pendingCheckoutKey = 'pending_logo_checkout';
      var unlockKey = 'pro_verified_unlock';
      var statusMessage = document.getElementById('status-message');
      var statusDetail = document.getElementById('status-detail');
      var supportAction = document.getElementById('support-action');

      function failOpenForSupport(message) {
        if (statusMessage) statusMessage.textContent = 'Payment verification needs attention';
        if (statusDetail) statusDetail.textContent = message;
        if (supportAction) supportAction.style.display = 'block';
      }

      function getPendingCheckout() {
        try {
          return JSON.parse(localStorage.getItem(pendingCheckoutKey) || 'null');
        } catch (e) {
          return null;
        }
      }

      function clearPendingCheckout() {
        try {
          localStorage.removeItem(pendingCheckoutKey);
        } catch (e) {}
      }

      async function verifyPayment(reference, planId) {
        var body = { plan_id: planId };
        if (reference.payment_id) body.payment_id = reference.payment_id;
        if (reference.checkout_id) body.checkout_id = reference.checkout_id;
        var response = await fetch('https://vcardqrcodegenerator.com/payment/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });
        var json = await response.json();
        if (!json.success) throw new Error(json.status || 'verification_failed');
        return json;
      }

      try {
        var params = new URLSearchParams(window.location.search);
        var planId = params.get('plan_id') || 'logo_vcard_one_time';
        var pending = getPendingCheckout();
        var paymentId = params.get('payment_id') || params.get('transaction_id');
        var checkoutId = params.get('checkout_id') || params.get('checkout_session_id') || params.get('session_id') || (pending && pending.plan_id === planId ? pending.checkout_id : null);
        var planName = planId === 'logo_generic_one_time' ? 'Generic Logo QR Code' : 'Logo vCard QR Code';
        var targetPage = pending && pending.source_page
          ? pending.source_page
          : (planId === 'logo_generic_one_time' ? '/qr-code-with-logo.html' : '/logo-qr-code.html');
        var payment = null;

        if (paymentId) {
          payment = await verifyPayment({ payment_id: paymentId }, planId);
        } else if (checkoutId) {
          payment = await verifyPayment({ checkout_id: checkoutId }, planId);
        } else {
          failOpenForSupport('Dodo returned without a payment reference. Please email support with your receipt so access can be restored.');
          return;
        }

        if (payment) {
          var value = typeof payment.value === 'number' ? payment.value : 4.99;
          var currency = payment.currency || 'USD';
          planId = payment.plan_id || planId;
          planName = payment.plan_name || planName;
          localStorage.setItem(unlockKey, JSON.stringify({
            payment_id: payment.payment_id || paymentId || checkoutId,
            plan_id: planId,
            value: value,
            currency: currency,
            status: payment.status || 'succeeded',
            expires_at: Date.now() + 24 * 60 * 60 * 1000
          }));
          clearPendingCheckout();
        }

        if (payment && window.VcardAnalytics) {
          var value = typeof payment.value === 'number' ? payment.value : 4.99;
          var currency = payment.currency || 'USD';
          var purchaseTracked = window.VcardAnalytics.trackPurchase({
            transaction_id: payment.payment_id || paymentId || checkoutId,
            value: value,
            currency: currency,
            plan_id: planId,
            plan_name: planName,
            payment_provider: 'dodo',
            payment_status: payment.status || 'succeeded',
            source_page: window.location.pathname,
            items: [{
              item_id: planId,
              item_name: planName,
              item_category: 'vcard_qr',
              price: value,
              quantity: 1
            }]
          });
          if (purchaseTracked !== false) {
            window.VcardAnalytics.trackEvent('pro_payment_success', {
              transaction_id: payment.payment_id || paymentId || checkoutId,
              value: value,
              currency: currency,
              plan_id: planId,
              plan_name: planName,
              payment_provider: 'dodo',
              payment_status: payment.status || 'succeeded',
              source_page: window.location.pathname
            });
          }
        }
      } catch (e) {
        failOpenForSupport('Dodo has not confirmed the payment to this browser yet. Refresh once in a minute; if it remains locked, email support with your receipt or payment ID.');
        return;
      }

      setTimeout(function () {
        window.location.replace(targetPage);
      }, 800);
    })();
  </script>
</body>
</html>
